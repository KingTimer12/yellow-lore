name: Release

# Manual, tag-driven release. Bump "version" in src-tauri/tauri.conf.json (and
# package.json to match), commit, then push a `vX.Y.Z` tag — that push triggers
# this workflow, builds the desktop bundles, and publishes a signed auto-updater
# artifact (latest.json) the app reads to update itself.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Fail fast if the pushed tag does not match tauri.conf.json (the version
  # source of truth). Prevents shipping a bundle whose in-app version lies.
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag == tauri.conf.json version
        id: check
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "v$VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME != tauri.conf.json v$VERSION — bump the version first"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # Desktop bundles. tauri-action creates (or reuses) the GitHub Release for the
  # pushed tag and uploads each platform's installers plus the signed updater
  # artifacts (latest.json + .sig) to it.
  desktop:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."
          cache-on-failure: true

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build & publish desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the update artifacts so the app trusts them (pubkey lives in
          # tauri.conf.json). Set these two repo secrets before releasing.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bunx tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Yellow Lore v${{ needs.validate.outputs.version }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
