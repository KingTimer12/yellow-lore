<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Ícone Yellow Lore</title>
  <desc>Letra Y formada por dois pescoços de dragão com chifres e presas, unindo-se num tronco que desce até um rabo pontudo. Fundo transparente.</desc>
  <defs>
    <linearGradient id="dragon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD75E"/>
      <stop offset="100%" stop-color="#E89400"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE79A"/>
      <stop offset="100%" stop-color="#FFC629"/>
    </linearGradient>
  </defs>

  <g id="half">
    <path d="M 512 360 C 520 330 545 300 580 270 C 610 245 640 220 669 195 L 679 150 L 690 195 C 715 215 742 225 762 245 L 766 275 L 730 285 C 705 300 680 310 655 330 C 615 365 585 400 560 440 C 545 465 528 490 518 520 L 512 520 C 560 560 585 620 585 680 C 585 740 565 800 530 850 L 512 900 Z" fill="url(#dragon)"/>
    <path d="M 600 300 C 630 275 655 250 675 225" fill="none" stroke="#7A4E00" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
    <circle cx="655" cy="255" r="8" fill="#5A3A00"/>
    <path d="M 735 268 C 752 262 768 266 776 282 C 762 280 748 284 738 292 C 736 284 735 276 735 268 Z" fill="url(#flame)"/>
  </g>
  <use href="#half" transform="translate(1024,0) scale(-1,1)"/>
</svg>
